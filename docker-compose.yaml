version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: ./infra
    dockerfile: airflow.Dockerfile
  environment:
    AIRFLOW_UID: "${AIRFLOW_UID}"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow_meta
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - crime-net

services:

  # 1. POSTGRES + POSTGIS
  postgres:
    build:
      context: ./infra
      dockerfile: postgres.Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
    networks:
      - crime-net

  # 2. AIRFLOW INIT
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      set -e
      airflow db migrate
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    restart: "no"

  # 3. AIRFLOW WEBSERVER 
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # 4. AIRFLOW SCHEDULER
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # 5. DEPLOYMENT AGENT (Secure Poller)
  # This agent checks for updates on the 'main' branch every 60 seconds.
  # It is safer for public repositories because it only pulls from your authoritative source.
  deploy-agent:
    image: docker:latest
    restart: always
    volumes:
      - //./pipe/docker_engine://./pipe/docker_engine
      - .:/app
    working_dir: /app
    entrypoint: >
      sh -c "
      apk add --no-cache git &&
      git config --global --add safe.directory /app &&
      while true; do
        git fetch origin main > /dev/null 2>&1 &&
        LOCAL=\$$(git rev-parse HEAD) &&
        REMOTE=\$$(git rev-parse origin/main) &&
        if [ \"\$$LOCAL\" != \"\$$REMOTE\" ]; then
          echo \"Changes detected. Redeploying...\" &&
          git pull origin main &&
          docker compose up -d --build;
        fi;
        sleep 60;
      done
      "
    networks:
      - crime-net

volumes:
  postgres_data:

networks:
  crime-net:
    driver: bridge
