version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: ./infra
    dockerfile: airflow.Dockerfile
  environment:
    AIRFLOW_UID: "${AIRFLOW_UID}"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow_meta
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - crime-net

services:

  # 1. POSTGRES + POSTGIS
  postgres:
    build:
      context: ./infra
      dockerfile: postgres.Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
    networks:
      - crime-net

  # 2. AIRFLOW INIT
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      set -e
      airflow db migrate
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    restart: "no"

  # 3. AIRFLOW WEBSERVER 
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # 4. AIRFLOW SCHEDULER
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # 5. OFFICIAL GITHUB ACTIONS RUNNER (Customized)
  deploy-agent:
    build:
      context: ./infra
      dockerfile: runner.Dockerfile
    restart: always
    environment:
      URL: "https://github.com/monitor-crime-talent-org/monitor-crime-and-talent"
      TOKEN: "${RUNNER_TOKEN}"
      RUNNER_NAME: "official-deploy-runner"
      RUNNER_LABELS: "deploy,self-hosted"
      RUNNER_ALLOW_RUNASROOT: "true"
      # TCP is the only reliable way for Linux-to-Windows Docker control
      DOCKER_HOST: "tcp://host.docker.internal:2375"
    volumes:
      - .:/home/runner/work/monitor-crime-and-talent/monitor-crime-and-talent
      - ./.env:/home/runner/work/monitor-crime-and-talent/monitor-crime-and-talent/.env
    entrypoint: ["/bin/bash", "-c", "./config.sh --url $$URL --token $$TOKEN --name $$RUNNER_NAME --labels $$RUNNER_LABELS --unattended --replace && ./run.sh"]
    user: root
    networks:
      - crime-net

volumes:
  postgres_data:

networks:
  crime-net:
    driver: bridge
