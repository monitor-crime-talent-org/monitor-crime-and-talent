name: Local Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    # Only run on runners with the 'deploy' label
    if: contains(github.event.head_commit.message, '') # Run on every push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build and Restart Services
        run: |
          # Use the mounted host docker and the propagated .env file to redeploy
          docker compose --env-file .env down
          docker compose --env-file .env up -d --build
